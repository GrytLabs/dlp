<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <marker id="arr-r" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#60a5fa"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#34d399"/>
    </marker>
    <marker id="arr-a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="960" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="38" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="0.15em">FIG. 6</text>
  <text x="480" y="62" font-family="'Inter', sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="600">The State Transformation Model</text>
  <text x="480" y="82" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Every organizational action becomes a primitive composition with full lineage</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEFT: DECISION INPUT CONTEXT                 -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="130" y="120" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">DECISION CONTEXT</text>

  <!-- Intent -->
  <rect x="50" y="145" width="160" height="55" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="168" font-family="'Inter', sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle" font-weight="600">Intent</text>
  <text x="130" y="185" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">the why — organizational purpose</text>

  <!-- Evidence -->
  <rect x="50" y="215" width="160" height="55" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5"/>
  <text x="130" y="238" font-family="'Inter', sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="600">Evidence</text>
  <text x="130" y="255" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">the proof — epistemic basis</text>

  <!-- Authority -->
  <rect x="50" y="285" width="160" height="55" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="130" y="308" font-family="'Inter', sans-serif" font-size="12" fill="#fcd34d" text-anchor="middle" font-weight="600">Authority</text>
  <text x="130" y="325" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">who decides — traceable chain</text>

  <!-- Constraint -->
  <rect x="50" y="355" width="160" height="55" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#f472b6" stroke-width="1.5"/>
  <text x="130" y="378" font-family="'Inter', sans-serif" font-size="12" fill="#f9a8d4" text-anchor="middle" font-weight="600">Constraint</text>
  <text x="130" y="395" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">the boundaries — what binds</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CENTER: THE TRANSFORMATION                   -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Input arrows converging -->
  <path d="M215,172 L330,290" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-opacity="0.5" marker-end="url(#arr-r)"/>
  <path d="M215,242 L330,295" stroke="#10b981" stroke-width="1.5" fill="none" stroke-opacity="0.5" marker-end="url(#arr-g)"/>
  <path d="M215,312 L330,305" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-opacity="0.5" marker-end="url(#arr-a)"/>
  <path d="M215,382 L330,315" stroke="#f472b6" stroke-width="1.5" fill="none" stroke-opacity="0.4"/>

  <!-- Decision node — the transformation point -->
  <rect x="335" y="245" width="190" height="120" rx="16" fill="#1e293b" stroke="#e2e8f0" stroke-width="2.5"/>
  <text x="430" y="280" font-family="'Inter', sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle" font-weight="700">Decision</text>
  <text x="430" y="302" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">State Transformation</text>
  <text x="430" y="322" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Primitive composition with</text>
  <text x="430" y="336" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">full lineage — who, what, why,</text>
  <text x="430" y="350" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">under what authority, subject to what</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- INVARIANT ENFORCEMENT BAND                   -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="300" y="400" width="260" height="42" rx="8" fill="#451a03" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="430" y="418" font-family="'Inter', sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="600">B1-B10 Enforced on Every Write</text>
  <text x="430" y="432" font-family="'Inter', sans-serif" font-size="8" fill="#fcd34d" text-anchor="middle" opacity="0.7">Conservation laws checked — no exceptions, no bypass</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RIGHT: OUTPUT — GOVERNED STATE + LINEAGE     -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Output arrows -->
  <path d="M530,280 L640,220" stroke="#60a5fa" stroke-width="2" fill="none" marker-end="url(#arr-r)"/>
  <path d="M530,320 L640,380" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>

  <!-- World Model State -->
  <text x="770" y="120" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">GOVERNED STATE</text>

  <rect x="650" y="145" width="260" height="155" rx="14" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="780" y="172" font-family="'Inter', sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" font-weight="600">Organizational World Model</text>
  <text x="780" y="195" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">New valid state produced</text>
  <text x="780" y="218" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">19 primitives across 5 tiers</text>
  <text x="780" y="236" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Every object carries truth type</text>
  <text x="780" y="254" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Append-only at Authoritative level</text>
  <text x="780" y="280" font-family="'Inter', sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle" opacity="0.6">Queryable by humans and AI systems</text>

  <!-- Lineage Record -->
  <text x="770" y="330" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">FULL LINEAGE</text>

  <rect x="650" y="350" width="260" height="120" rx="14" fill="#10b981" fill-opacity="0.06" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="780" y="377" font-family="'Inter', sans-serif" font-size="13" fill="#6ee7b7" text-anchor="middle" font-weight="600">Decision Lineage Record</text>
  <text x="780" y="400" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Who decided what</text>
  <text x="780" y="418" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Based on what evidence</text>
  <text x="780" y="436" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Under what authority</text>
  <text x="780" y="454" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Subject to what constraints</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CONSERVATION LAWS TABLE (bottom)             -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="60" y="505" width="840" height="170" rx="14" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="1"/>
  <text x="480" y="530" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">NINE ORGANIZATIONAL INVARIANCES (§9.3)</text>
  <text x="480" y="545" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Each primitive preserves a symmetry whose violation produces a diagnosable governance failure</text>

  <!-- Row 1 -->
  <text x="110" y="572" font-family="'Inter', sans-serif" font-size="10" fill="#93c5fd" font-weight="600">Intent</text>
  <text x="180" y="572" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Purpose invariance</text>

  <text x="390" y="572" font-family="'Inter', sans-serif" font-size="10" fill="#93c5fd" font-weight="600">Commitment</text>
  <text x="490" y="572" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Obligation invariance</text>

  <text x="680" y="572" font-family="'Inter', sans-serif" font-size="10" fill="#93c5fd" font-weight="600">Capacity</text>
  <text x="752" y="572" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Resource invariance</text>

  <!-- Row 2 -->
  <text x="110" y="596" font-family="'Inter', sans-serif" font-size="10" fill="#6ee7b7" font-weight="600">Work</text>
  <text x="160" y="596" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Execution invariance</text>

  <text x="390" y="596" font-family="'Inter', sans-serif" font-size="10" fill="#6ee7b7" font-weight="600">Evidence</text>
  <text x="465" y="596" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Verification invariance</text>

  <text x="680" y="596" font-family="'Inter', sans-serif" font-size="10" fill="#6ee7b7" font-weight="600">Decision</text>
  <text x="756" y="596" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">State-change invariance</text>

  <!-- Row 3 -->
  <text x="110" y="620" font-family="'Inter', sans-serif" font-size="10" fill="#fcd34d" font-weight="600">Authority</text>
  <text x="190" y="620" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Delegation invariance</text>

  <text x="390" y="620" font-family="'Inter', sans-serif" font-size="10" fill="#f9a8d4" font-weight="600">Constraint</text>
  <text x="475" y="620" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Enforcement invariance</text>

  <text x="680" y="620" font-family="'Inter', sans-serif" font-size="10" fill="#fcd34d" font-weight="600">Account</text>
  <text x="750" y="620" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Context invariance</text>

  <!-- Bottom note -->
  <text x="480" y="656" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle" font-style="italic">Same context → same answer, regardless of access path, executor, or framing (§9)</text>

  <!-- Footer -->
  <text x="480" y="715" font-family="'Inter', sans-serif" font-size="9" fill="#334155" text-anchor="middle">Decision Lineage Protocol · §9 Symmetry and Conservation Laws · State Transformation Architecture</text>
</svg>
