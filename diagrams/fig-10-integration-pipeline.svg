<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#60a5fa"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#34d399"/>
    </marker>
    <marker id="arr-a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="960" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="38" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="0.15em">FIG. 10</text>
  <text x="480" y="62" font-family="'Inter', sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="600">Integration Pipeline and Graduation</text>
  <text x="480" y="82" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Eight-stage alignment pipeline with three-matcher architecture and four-stage graduation pathway</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TOP: EIGHT-STAGE ALIGNMENT PIPELINE          -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="480" y="115" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">ALIGNMENT PIPELINE (§18.3)</text>

  <!-- Stage 1: External Field Scan -->
  <rect x="30" y="135" width="100" height="60" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="#64748b" stroke-width="1.5"/>
  <text x="80" y="157" font-family="'Inter', sans-serif" font-size="8" fill="#64748b" text-anchor="middle" font-weight="700">1</text>
  <text x="80" y="170" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">External</text>
  <text x="80" y="181" font-family="'Inter', sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Field Scan</text>

  <line x1="134" y1="165" x2="148" y2="165" stroke="#334155" stroke-width="1.5"/>

  <!-- Three Matchers (2, 3, 4) — parallel -->
  <rect x="152" y="122" width="210" height="90" rx="10" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="257" y="120" font-family="'Inter', sans-serif" font-size="7" fill="#3b82f6" text-anchor="middle" font-weight="600">THREE INDEPENDENT MATCHERS</text>

  <rect x="160" y="130" width="60" height="35" rx="6" fill="#1e293b" fill-opacity="0.6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="143" font-family="'Inter', sans-serif" font-size="7" fill="#3b82f6" text-anchor="middle" font-weight="700">2</text>
  <text x="190" y="155" font-family="'Inter', sans-serif" font-size="7" fill="#93c5fd" text-anchor="middle">Lexical</text>

  <rect x="232" y="130" width="60" height="35" rx="6" fill="#1e293b" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5"/>
  <text x="262" y="143" font-family="'Inter', sans-serif" font-size="7" fill="#10b981" text-anchor="middle" font-weight="700">3</text>
  <text x="262" y="155" font-family="'Inter', sans-serif" font-size="7" fill="#6ee7b7" text-anchor="middle">Structural</text>

  <rect x="304" y="130" width="55" height="35" rx="6" fill="#1e293b" fill-opacity="0.6" stroke="#a855f7" stroke-width="1.5"/>
  <text x="331" y="143" font-family="'Inter', sans-serif" font-size="7" fill="#a855f7" text-anchor="middle" font-weight="700">4</text>
  <text x="331" y="155" font-family="'Inter', sans-serif" font-size="7" fill="#c4b5fd" text-anchor="middle">Semantic</text>

  <!-- Truth type labels -->
  <text x="257" y="182" font-family="'Inter', sans-serif" font-size="7" fill="#10b981" text-anchor="middle" opacity="0.6">All outputs: Derived</text>
  <text x="257" y="196" font-family="'Inter', sans-serif" font-size="7" fill="#64748b" text-anchor="middle" font-style="italic">Independent — no cross-matcher input</text>

  <line x1="365" y1="155" x2="378" y2="155" stroke="#334155" stroke-width="1.5"/>

  <!-- Stage 5: Confidence Aggregator -->
  <rect x="382" y="135" width="100" height="60" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="432" y="157" font-family="'Inter', sans-serif" font-size="8" fill="#06b6d4" text-anchor="middle" font-weight="700">5</text>
  <text x="432" y="170" font-family="'Inter', sans-serif" font-size="8" fill="#67e8f9" text-anchor="middle">Confidence</text>
  <text x="432" y="181" font-family="'Inter', sans-serif" font-size="8" fill="#67e8f9" text-anchor="middle">Aggregator</text>

  <line x1="486" y1="165" x2="500" y2="165" stroke="#334155" stroke-width="1.5"/>

  <!-- Stage 6: Claim Writer -->
  <rect x="504" y="135" width="100" height="60" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="554" y="157" font-family="'Inter', sans-serif" font-size="8" fill="#06b6d4" text-anchor="middle" font-weight="700">6</text>
  <text x="554" y="170" font-family="'Inter', sans-serif" font-size="8" fill="#67e8f9" text-anchor="middle">Claim</text>
  <text x="554" y="181" font-family="'Inter', sans-serif" font-size="8" fill="#67e8f9" text-anchor="middle">Writer</text>

  <line x1="608" y1="165" x2="622" y2="165" stroke="#334155" stroke-width="1.5"/>

  <!-- B10 GATE between computational and human -->
  <rect x="625" y="140" width="80" height="50" rx="6" fill="#451a03" fill-opacity="0.4" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="161" font-family="'Inter', sans-serif" font-size="8" fill="#fbbf24" text-anchor="middle" font-weight="700">B10 GATE</text>
  <text x="665" y="178" font-family="'Inter', sans-serif" font-size="7" fill="#fcd34d" text-anchor="middle">Human review</text>

  <line x1="709" y1="165" x2="722" y2="165" stroke="#fbbf24" stroke-width="1.5"/>

  <!-- Stage 7: Review Queue -->
  <rect x="726" y="135" width="100" height="60" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="776" y="157" font-family="'Inter', sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="700">7</text>
  <text x="776" y="170" font-family="'Inter', sans-serif" font-size="8" fill="#fcd34d" text-anchor="middle">Review</text>
  <text x="776" y="181" font-family="'Inter', sans-serif" font-size="8" fill="#fcd34d" text-anchor="middle">Queue</text>

  <line x1="830" y1="165" x2="844" y2="165" stroke="#334155" stroke-width="1.5"/>

  <!-- Stage 8: Graduation Engine -->
  <rect x="848" y="135" width="90" height="60" rx="8" fill="#1e293b" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5"/>
  <text x="893" y="157" font-family="'Inter', sans-serif" font-size="8" fill="#10b981" text-anchor="middle" font-weight="700">8</text>
  <text x="893" y="170" font-family="'Inter', sans-serif" font-size="8" fill="#6ee7b7" text-anchor="middle">Graduation</text>
  <text x="893" y="181" font-family="'Inter', sans-serif" font-size="8" fill="#6ee7b7" text-anchor="middle">Engine</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MIDDLE: GRADUATION PATHWAY (§18.4)           -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="480" y="250" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">GRADUATION PATHWAY (§18.4)</text>

  <!-- Proposed -->
  <rect x="60" y="270" width="190" height="115" rx="12" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="1.5"/>
  <text x="155" y="296" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="700">Proposed</text>
  <text x="155" y="316" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Namespace: Sandbox</text>
  <text x="155" y="334" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Above minimum threshold</text>
  <text x="155" y="352" font-family="'Inter', sans-serif" font-size="9" fill="#10b981" text-anchor="middle">Derived</text>
  <text x="155" y="370" font-family="'Inter', sans-serif" font-size="8" fill="#475569" text-anchor="middle" font-style="italic">Computational proposal</text>

  <!-- Arrow -->
  <path d="M255,328 L290,328" stroke="#60a5fa" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Reviewed -->
  <rect x="295" y="270" width="190" height="115" rx="12" fill="#1e293b" fill-opacity="0.6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="296" font-family="'Inter', sans-serif" font-size="14" fill="#fcd34d" text-anchor="middle" font-weight="700">Reviewed</text>
  <text x="390" y="316" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Namespace: Tenant</text>
  <text x="390" y="334" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Human confirms alignment</text>
  <text x="390" y="352" font-family="'Inter', sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle">Declared</text>
  <text x="390" y="370" font-family="'Inter', sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-style="italic">Human authority required (B5)</text>

  <!-- Arrow -->
  <path d="M490,328 L525,328" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>

  <!-- Confirmed -->
  <rect x="530" y="270" width="190" height="115" rx="12" fill="#1e293b" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5"/>
  <text x="625" y="296" font-family="'Inter', sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle" font-weight="700">Confirmed</text>
  <text x="625" y="316" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Namespace: Domain</text>
  <text x="625" y="334" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Cross-validation evidence</text>
  <text x="625" y="352" font-family="'Inter', sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle">Declared + verified</text>
  <text x="625" y="370" font-family="'Inter', sans-serif" font-size="8" fill="#10b981" text-anchor="middle" font-style="italic">Domain authority required</text>

  <!-- Arrow -->
  <path d="M725,328 L760,328" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arr-a)"/>

  <!-- Canonical -->
  <rect x="765" y="270" width="155" height="115" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="2"/>
  <text x="842" y="296" font-family="'Inter', sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" font-weight="700">Canonical</text>
  <text x="842" y="316" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Namespace: Core</text>
  <text x="842" y="334" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Highest confidence</text>
  <text x="842" y="352" font-family="'Inter', sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle">Declared + full verification</text>
  <text x="842" y="370" font-family="'Inter', sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle" font-style="italic">Governance steward review</text>

  <!-- Backward arrow (regression) -->
  <path d="M530,390 C470,420 360,420 300,390" stroke="#ef4444" stroke-width="1" fill="none" stroke-dasharray="4,3" stroke-opacity="0.4"/>
  <text x="415" y="418" font-family="'Inter', sans-serif" font-size="7" fill="#fca5a5" text-anchor="middle" opacity="0.7">backward if contradicting evidence</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- AI-CANNOT-BE-PRINCIPAL note                  -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="60" y="420" width="840" height="42" rx="8" fill="#451a03" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="480" y="438" font-family="'Inter', sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="600">AI-Cannot-Be-Principal — no automated graduation to domain or core namespace</text>
  <text x="480" y="454" font-family="'Inter', sans-serif" font-size="8" fill="#fcd34d" text-anchor="middle" opacity="0.7">Graduated mappings become governance infrastructure — incorrect canonical mapping propagates errors through all subsequent integration</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- THREE-MATCHER DETAIL (bottom)                -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="60" y="485" width="840" height="185" rx="14" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="1"/>
  <text x="480" y="510" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">THREE-MATCHER ARCHITECTURE — ORTHOGONAL ASSESSMENT</text>

  <!-- Lexical -->
  <rect x="90" y="525" width="240" height="90" rx="10" fill="#1e293b" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="550" font-family="'Inter', sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle" font-weight="600">Lexical Matcher</text>
  <text x="210" y="570" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Surface form analysis</text>
  <text x="210" y="588" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Token overlap, synonym matching,</text>
  <text x="210" y="602" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">string similarity computation</text>

  <!-- Structural -->
  <rect x="360" y="525" width="240" height="90" rx="10" fill="#1e293b" fill-opacity="0.5" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="550" font-family="'Inter', sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="600">Structural Matcher</text>
  <text x="480" y="570" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Structural properties</text>
  <text x="480" y="588" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Data type compatibility,</text>
  <text x="480" y="602" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">cardinality, pattern matching</text>

  <!-- Semantic -->
  <rect x="630" y="525" width="240" height="90" rx="10" fill="#1e293b" fill-opacity="0.5" stroke="#a855f7" stroke-width="1.5"/>
  <text x="750" y="550" font-family="'Inter', sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle" font-weight="600">Semantic Matcher</text>
  <text x="750" y="570" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Meaning analysis</text>
  <text x="750" y="588" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Embedding-based similarity,</text>
  <text x="750" y="602" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">contextual meaning resolution</text>

  <!-- Consensus note -->
  <text x="480" y="650" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle" font-style="italic">Agreement across independent methods provides stronger evidence — genuine consensus, not cascading confirmation</text>

  <!-- Footer -->
  <text x="480" y="715" font-family="'Inter', sans-serif" font-size="9" fill="#334155" text-anchor="middle">Decision Lineage Protocol · §18 Integration Engine · Eight-Stage Pipeline · Four-Stage Graduation · Three-Matcher Architecture</text>
</svg>
