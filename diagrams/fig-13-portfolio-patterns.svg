<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" width="960" height="680">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <marker id="arr-b" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#60a5fa"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#34d399"/>
    </marker>
    <marker id="arr-a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="960" height="680" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="38" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="0.15em">FIG. 13</text>
  <text x="480" y="62" font-family="'Inter', sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="600">Portfolio Patterns</text>
  <text x="480" y="82" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Three instance relationship models — parent/child, federated, graduated — Beer's recursion operationalized</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PATTERN 1: PARENT/CHILD (left)               -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="40" y="110" width="280" height="380" rx="14" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="180" y="140" font-family="'Inter', sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" font-weight="700">Parent / Child</text>
  <text x="180" y="158" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Hierarchical governance inheritance</text>

  <!-- Parent instance -->
  <rect x="90" y="178" width="180" height="70" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="205" font-family="'Inter', sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle" font-weight="600">EAS Parent</text>
  <text x="180" y="225" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Full governance, root authority</text>
  <text x="180" y="240" font-family="'Inter', sans-serif" font-size="8" fill="#64748b" text-anchor="middle">All 5 tiers active</text>

  <!-- Child arrows -->
  <path d="M140,253 L105,285" stroke="#60a5fa" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>
  <path d="M220,253 L255,285" stroke="#60a5fa" stroke-width="1.5" fill="none" marker-end="url(#arr-b)"/>

  <!-- Child 1 -->
  <rect x="55" y="290" width="100" height="55" rx="8" fill="#1e293b" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="313" font-family="'Inter', sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" font-weight="600">BAS Child</text>
  <text x="105" y="330" font-family="'Inter', sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Dept / team</text>

  <!-- Child 2 -->
  <rect x="205" y="290" width="100" height="55" rx="8" fill="#1e293b" fill-opacity="0.5" stroke="#3b82f6" stroke-width="1"/>
  <text x="255" y="313" font-family="'Inter', sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" font-weight="600">PAS Child</text>
  <text x="255" y="330" font-family="'Inter', sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Project scope</text>

  <!-- PAS inherits -->
  <text x="180" y="370" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Authority chain inherited</text>
  <text x="180" y="386" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Invariants enforced uniformly</text>
  <text x="180" y="402" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">PAS knowledge governance</text>
  <text x="180" y="418" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">routes to parent</text>

  <text x="180" y="470" font-family="'Inter', sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle" font-style="italic">Enterprise → department → project</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PATTERN 2: FEDERATED (center)                -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="340" y="110" width="280" height="380" rx="14" fill="#10b981" fill-opacity="0.04" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="480" y="140" font-family="'Inter', sans-serif" font-size="13" fill="#6ee7b7" text-anchor="middle" font-weight="700">Federated</text>
  <text x="480" y="158" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Peer instances with cross-visibility</text>

  <!-- Peer 1 -->
  <rect x="360" y="178" width="120" height="70" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
  <text x="420" y="205" font-family="'Inter', sans-serif" font-size="11" fill="#6ee7b7" text-anchor="middle" font-weight="600">Instance A</text>
  <text x="420" y="225" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Business unit 1</text>

  <!-- Peer 2 -->
  <rect x="500" y="178" width="120" height="70" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
  <text x="560" y="205" font-family="'Inter', sans-serif" font-size="11" fill="#6ee7b7" text-anchor="middle" font-weight="600">Instance B</text>
  <text x="560" y="225" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Business unit 2</text>

  <!-- Peer 3 -->
  <rect x="430" y="268" width="120" height="70" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
  <text x="490" y="295" font-family="'Inter', sans-serif" font-size="11" fill="#6ee7b7" text-anchor="middle" font-weight="600">Instance C</text>
  <text x="490" y="315" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Business unit 3</text>

  <!-- Federation lines -->
  <line x1="478" y1="215" x2="502" y2="215" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5"/>
  <line x1="442" y1="252" x2="462" y2="270" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5"/>
  <line x1="530" y1="252" x2="518" y2="270" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5"/>

  <text x="480" y="365" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Same primitives, same invariants</text>
  <text x="480" y="381" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Cross-instance pattern visibility</text>
  <text x="480" y="397" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Shared constraint discovery</text>
  <text x="480" y="413" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Linkable mode per deployment group</text>

  <text x="480" y="470" font-family="'Inter', sans-serif" font-size="8" fill="#10b981" text-anchor="middle" font-style="italic">Multi-BU governance with cross-domain legibility</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- PATTERN 3: GRADUATED (right)                 -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="640" y="110" width="280" height="380" rx="14" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="780" y="140" font-family="'Inter', sans-serif" font-size="13" fill="#fcd34d" text-anchor="middle" font-weight="700">Graduated</text>
  <text x="780" y="158" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Profile transitions as the org matures</text>

  <!-- PAS -->
  <rect x="700" y="178" width="160" height="55" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#64748b" stroke-width="1.5"/>
  <text x="780" y="202" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="600">PAS</text>
  <text x="780" y="220" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Project scope, lightweight</text>

  <!-- Arrow -->
  <path d="M780,238 L780,265" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arr-a)"/>
  <text x="802" y="255" font-family="'Inter', sans-serif" font-size="7" fill="#fbbf24">graduate</text>

  <!-- BAS -->
  <rect x="700" y="270" width="160" height="55" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="780" y="294" font-family="'Inter', sans-serif" font-size="12" fill="#fcd34d" text-anchor="middle" font-weight="600">BAS</text>
  <text x="780" y="312" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Business unit, medium governance</text>

  <!-- Arrow -->
  <path d="M780,330 L780,357" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arr-a)"/>
  <text x="802" y="347" font-family="'Inter', sans-serif" font-size="7" fill="#fbbf24">graduate</text>

  <!-- EAS -->
  <rect x="700" y="362" width="160" height="55" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#3b82f6" stroke-width="2"/>
  <text x="780" y="386" font-family="'Inter', sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle" font-weight="600">EAS</text>
  <text x="780" y="404" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Enterprise, full governance</text>

  <text x="780" y="445" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Graduation is a Decision (B4)</text>
  <text x="780" y="461" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">with Authority (B5) and</text>
  <text x="780" y="477" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">accumulated Evidence</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SHARED FOUNDATION (bottom)                   -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="40" y="515" width="880" height="70" rx="10" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="1"/>
  <text x="480" y="540" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.08em">SHARED ACROSS ALL PATTERNS</text>
  <text x="480" y="560" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Same 19 primitives · Same 10 invariants · Same truth type system · Same state transformation model</text>
  <text x="480" y="575" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle" font-style="italic">Profile differences appear in which tiers are activated and how primitives are configured, not in the protocol itself</text>

  <!-- Recursion principle note -->
  <rect x="40" y="600" width="880" height="40" rx="8" fill="#451a03" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="480" y="618" font-family="'Inter', sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="600">Beer's Recursion Principle — each new operational possibility is a new viable system instance on shared infrastructure</text>
  <text x="480" y="632" font-family="'Inter', sans-serif" font-size="8" fill="#fcd34d" text-anchor="middle" opacity="0.7">Governance in one domain is directly legible in another — primitives compose across domains without translation</text>

  <!-- Footer -->
  <text x="480" y="675" font-family="'Inter', sans-serif" font-size="9" fill="#334155" text-anchor="middle">Decision Lineage Protocol · §23 Portfolio Patterns · §21 Substrate Profiles · Three Relationship Models</text>
</svg>
