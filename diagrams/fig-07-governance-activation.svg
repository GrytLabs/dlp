<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <marker id="arr-up" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <polygon points="0 6, 4 0, 8 6" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="960" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="38" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="0.15em">FIG. 7</text>
  <text x="480" y="62" font-family="'Inter', sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="600">Governance Activation Logic</text>
  <text x="480" y="82" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Six-stage activation pipeline and four materiality levels — how strict does governance get?</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEFT: ACTIVATION PIPELINE (6 stages)         -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="215" y="115" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">ACTIVATION PIPELINE</text>

  <!-- Stage 1 -->
  <rect x="60" y="140" width="310" height="48" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="161" font-family="'Inter', sans-serif" font-size="9" fill="#3b82f6" font-weight="700">1</text>
  <text x="100" y="161" font-family="'Inter', sans-serif" font-size="11" fill="#93c5fd" font-weight="600">Organization Profile</text>
  <text x="100" y="177" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Industry, scale, regulatory environment</text>

  <!-- Arrow -->
  <line x1="215" y1="192" x2="215" y2="205" stroke="#334155" stroke-width="1.5"/>

  <!-- Stage 2 -->
  <rect x="60" y="208" width="310" height="48" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="229" font-family="'Inter', sans-serif" font-size="9" fill="#3b82f6" font-weight="700">2</text>
  <text x="100" y="229" font-family="'Inter', sans-serif" font-size="11" fill="#93c5fd" font-weight="600">Source Activation</text>
  <text x="100" y="245" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Rule-based matching — human confirms (B5)</text>

  <line x1="215" y1="260" x2="215" y2="273" stroke="#334155" stroke-width="1.5"/>

  <!-- Stage 3 -->
  <rect x="60" y="276" width="310" height="48" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="297" font-family="'Inter', sans-serif" font-size="9" fill="#3b82f6" font-weight="700">3</text>
  <text x="100" y="297" font-family="'Inter', sans-serif" font-size="11" fill="#93c5fd" font-weight="600">Requirements Projection</text>
  <text x="100" y="313" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Pattern signatures + governance criticality</text>

  <line x1="215" y1="328" x2="215" y2="341" stroke="#334155" stroke-width="1.5"/>

  <!-- Stage 4 -->
  <rect x="60" y="344" width="310" height="48" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#10b981" stroke-width="1.5"/>
  <text x="80" y="365" font-family="'Inter', sans-serif" font-size="9" fill="#10b981" font-weight="700">4</text>
  <text x="100" y="365" font-family="'Inter', sans-serif" font-size="11" fill="#6ee7b7" font-weight="600">Gap Projection</text>
  <text x="100" y="381" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Compare required vs. existing — AI MAY assist (Derived)</text>

  <line x1="215" y1="396" x2="215" y2="409" stroke="#334155" stroke-width="1.5"/>

  <!-- Stage 5 -->
  <rect x="60" y="412" width="310" height="48" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="433" font-family="'Inter', sans-serif" font-size="9" fill="#f59e0b" font-weight="700">5</text>
  <text x="100" y="433" font-family="'Inter', sans-serif" font-size="11" fill="#fcd34d" font-weight="600">Closure Roadmap</text>
  <text x="100" y="449" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Prioritized by conservation criticality (§12.6)</text>

  <line x1="215" y1="464" x2="215" y2="477" stroke="#334155" stroke-width="1.5"/>

  <!-- Stage 6 -->
  <rect x="60" y="480" width="310" height="48" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#a855f7" stroke-width="1.5"/>
  <text x="80" y="501" font-family="'Inter', sans-serif" font-size="9" fill="#a855f7" font-weight="700">6</text>
  <text x="100" y="501" font-family="'Inter', sans-serif" font-size="11" fill="#c4b5fd" font-weight="600">Change Propagation</text>
  <text x="100" y="517" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Event-driven re-evaluation feedback loop</text>

  <!-- Feedback loop arrow from 6 back to 2 -->
  <path d="M60,504 L35,504 L35,224 L55,224" stroke="#a855f7" stroke-width="1" fill="none" stroke-dasharray="4,3" stroke-opacity="0.4"/>
  <text x="28" y="370" font-family="'Inter', sans-serif" font-size="7" fill="#a855f7" opacity="0.5" transform="rotate(-90, 28, 370)">feedback loop</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RIGHT: FOUR MATERIALITY LEVELS               -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="680" y="115" font-family="'Inter', sans-serif" font-size="10" fill="#475569" text-anchor="middle" font-weight="600" letter-spacing="0.1em">MATERIALITY LEVELS</text>
  <text x="680" y="132" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Escalating governance response</text>

  <!-- Escalation arrow -->
  <rect x="454" y="160" width="8" height="380" rx="4" fill="#f59e0b" fill-opacity="0.08"/>
  <line x1="458" y1="540" x2="458" y2="165" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.3" marker-end="url(#arr-up)"/>
  <text x="458" y="555" font-family="'Inter', sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle" opacity="0.5">increasing</text>
  <text x="458" y="565" font-family="'Inter', sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle" opacity="0.5">governance</text>

  <!-- DIRECT (bottom — lowest) -->
  <rect x="490" y="440" width="420" height="95" rx="12" fill="#1e293b" fill-opacity="0.5" stroke="#334155" stroke-width="1.5"/>
  <text x="510" y="465" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8" font-weight="700">DIRECT</text>
  <text x="510" y="485" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">Routine governance — operational decisions</text>
  <text x="510" y="503" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Actor decides within delegation. Lineage recorded.</text>
  <text x="510" y="519" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Standard enforcement, standard evidence requirements.</text>

  <!-- NOTICE -->
  <rect x="490" y="330" width="420" height="95" rx="12" fill="#1e293b" fill-opacity="0.5" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="510" y="355" font-family="'Inter', sans-serif" font-size="14" fill="#67e8f9" font-weight="700">NOTICE</text>
  <text x="510" y="375" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">Informed awareness — affected parties notified</text>
  <text x="510" y="393" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Decision proceeds. Notification routed to stakeholders.</text>
  <text x="510" y="409" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Enhanced evidence requirements. Signal surfaces generated.</text>

  <!-- APPROVE -->
  <rect x="490" y="220" width="420" height="95" rx="12" fill="#1e293b" fill-opacity="0.5" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="510" y="245" font-family="'Inter', sans-serif" font-size="14" fill="#fcd34d" font-weight="700">APPROVE</text>
  <text x="510" y="265" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">Explicit authorization required before action</text>
  <text x="510" y="283" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Decision blocked until authority holder approves.</text>
  <text x="510" y="299" font-family="'Inter', sans-serif" font-size="9" fill="#64748b">Full evidence trail. Constraint evaluation mandatory.</text>

  <!-- RATIFIED -->
  <rect x="490" y="148" width="420" height="58" rx="12" fill="#1e293b" fill-opacity="0.5" stroke="#ef4444" stroke-width="1.5"/>
  <text x="510" y="173" font-family="'Inter', sans-serif" font-size="14" fill="#fca5a5" font-weight="700">RATIFIED</text>
  <text x="510" y="193" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">Collective endorsement — board-level, constitutional</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- B1-B10 ENFORCEMENT NOTE (bottom)             -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="60" y="570" width="840" height="82" rx="10" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="1"/>
  <text x="80" y="593" font-family="'Inter', sans-serif" font-size="10" fill="#475569" font-weight="600" letter-spacing="0.08em">INVARIANT ENFORCEMENT IN THE PIPELINE</text>
  <text x="80" y="613" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Every pipeline stage enforces applicable behavioral invariants (B1-B10). Gap closure work requires Commitment (B1).</text>
  <text x="80" y="630" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Closure commitments backed by Capacity (B2). All evidence typed (B3). Every decision linked to Account (B4).</text>
  <text x="80" y="647" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8">Authority traceable on every activation, closure, and propagation decision (B5). AI gap projections are Derived — never Authoritative.</text>

  <!-- Footer -->
  <text x="480" y="695" font-family="'Inter', sans-serif" font-size="9" fill="#334155" text-anchor="middle">Decision Lineage Protocol · §12 Governance Activation Logic · Six-Stage Pipeline · Four Materiality Levels</text>
</svg>
